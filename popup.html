<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JPI API Inspector</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      background: #ffffff;
      color: #1a1a1a;
    }

    .header {
      background: #0f172a;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: #3b82f6;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #f8fafc;
      letter-spacing: 0.01em;
    }

    .header-subtitle {
      font-size: 11px;
      color: #64748b;
      margin-top: 1px;
    }

    /* ── Detected site info ── */
    .site-info {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #f1f5f9;
    }

    .site-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
    }

    .site-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
      min-width: 38px;
    }

    .site-value {
      font-size: 13px;
      color: #0f172a;
      font-weight: 500;
      word-break: break-all;
    }

    .branch-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fef3c7;
      color: #92400e;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      margin-top: 6px;
    }

    .branch-dot {
      width: 5px;
      height: 5px;
      background: #f59e0b;
      border-radius: 50%;
    }

    /* ── Buttons ── */
    .actions {
      padding: 12px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .actions-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
      margin-bottom: 2px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      text-align: left;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }

    .btn-prod {
      background: #dc2626;
      color: white;
    }

    .btn-dev {
      background: #16a34a;
      color: white;
    }

    .btn-label {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .btn-env {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .btn-desc {
      font-size: 12px;
      font-weight: 500;
      opacity: 0.9;
    }

    .btn-arrow {
      font-size: 16px;
      opacity: 0.7;
    }

    /* ── Not recognised state ── */
    .not-recognised {
      padding: 20px 16px;
      text-align: center;
    }

    .not-recognised-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .not-recognised-title {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }

    .not-recognised-desc {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }

    /* ── Loading state ── */
    .loading {
      padding: 20px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #64748b;
      font-size: 13px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Utilities ── */
    [hidden] { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">API</div>
    <div>
      <div class="header-title">JPI API Inspector</div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="state-loading">
    <div class="spinner"></div>
    Detecting site…
  </div>

  <!-- Not recognised -->
  <div class="not-recognised" id="state-unrecognised" hidden>
    <div class="not-recognised-icon">🔍</div>
    <div class="not-recognised-title">Site not recognised</div>
    <div class="not-recognised-desc">
      Navigate to a JPI newspaper site or a <code>jpi-web-dev-*</code> feature branch to inspect its API.
    </div>
  </div>

  <!-- Detected -->
  <div id="state-detected" hidden>
    <div class="site-info">
      <div class="site-row">
        <span class="site-label">Site</span>
        <span class="site-value" id="detected-domain">—</span>
      </div>
      <div class="site-row">
        <span class="site-label">Path</span>
        <span class="site-value" id="detected-path">—</span>
      </div>
      <div id="branch-indicator" hidden>
        <div class="branch-badge">
          <div class="branch-dot"></div>
          <span id="branch-name">Feature branch</span>
        </div>
      </div>
    </div>

    <div class="actions">
      <div class="actions-label">Open API response in side panel</div>
      <button class="btn btn-prod" id="btn-prod">
        <div class="btn-label">
          <span class="btn-env">Production</span>
          <span class="btn-desc">jpi-api-prod.brightsites.co.uk</span>
        </div>
        <span class="btn-arrow">→</span>
      </button>
      <button class="btn btn-dev" id="btn-dev">
        <div class="btn-label">
          <span class="btn-env">Development</span>
          <span class="btn-desc">jpi-api-dev.brightsites.co.uk</span>
        </div>
        <span class="btn-arrow">→</span>
      </button>
    </div>
  </div>

  <script src="sites.js"></script>
  <script src="popup.js"></script>
</body>
</html>
