<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JPI API Inspector</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 14px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-name {
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .env-badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .env-badge.prod {
      background: rgba(220, 38, 38, 0.15);
      color: #f87171;
      border: 1px solid rgba(220, 38, 38, 0.3);
    }

    .env-badge.dev {
      background: rgba(22, 163, 74, 0.15);
      color: #4ade80;
      border: 1px solid rgba(22, 163, 74, 0.3);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-icon {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
    }

    .btn-icon:hover {
      background: #21262d;
      color: #e6edf3;
    }

    .btn-icon:active {
      background: #30363d;
    }

    .btn-icon.spinning svg {
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .meta-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 8px;
      align-items: baseline;
    }

    .meta-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #484f58;
    }

    .meta-value {
      font-size: 12px;
      color: #8b949e;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      word-break: break-all;
    }

    .meta-value.highlight {
      color: #79c0ff;
    }

    /* ── Main content ────────────────────────────────────────────────────── */
    .content {
      padding: 14px;
      min-height: calc(100vh - 120px);
    }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: #484f58;
      text-align: center;
      gap: 10px;
    }

    .empty-icon {
      font-size: 36px;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 14px;
      font-weight: 600;
    }

    .empty-desc {
      font-size: 12px;
      line-height: 1.6;
      max-width: 220px;
    }

    /* ── Loading state ───────────────────────────────────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 14px;
      color: #484f58;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #21262d;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .loading-text {
      font-size: 13px;
    }

    /* ── Error state ─────────────────────────────────────────────────────── */
    .error-state {
      background: rgba(220, 38, 38, 0.08);
      border: 1px solid rgba(220, 38, 38, 0.25);
      border-radius: 8px;
      padding: 16px;
    }

    .error-title {
      font-size: 13px;
      font-weight: 600;
      color: #f87171;
      margin-bottom: 6px;
    }

    .error-message {
      font-size: 12px;
      color: #fca5a5;
      font-family: 'SF Mono', 'Fira Code', monospace;
      word-break: break-word;
    }

    /* ── Response meta bar ───────────────────────────────────────────────── */
    .response-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 11px;
      color: #484f58;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 5px;
    }

    .status-ok {
      background: rgba(22, 163, 74, 0.15);
      color: #4ade80;
    }

    .status-error {
      background: rgba(220, 38, 38, 0.15);
      color: #f87171;
    }

    /* ── JSON viewer ─────────────────────────────────────────────────────── */
    .json-container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
    }

    .json-content {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.65;
      white-space: pre;
      tab-size: 2;
    }

    /* Syntax highlighting */
    .json-key    { color: #79c0ff; }
    .json-string { color: #a5d6ff; }
    .json-number { color: #f8c555; }
    .json-bool   { color: #ff7b72; }
    .json-null   { color: #8b949e; font-style: italic; }
    .json-punct  { color: #e6edf3; }

    /* ── Utilities ───────────────────────────────────────────────────────── */
    [hidden] { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <span class="app-name">JPI API</span>
        <span class="env-badge" id="env-badge" hidden>PROD</span>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="btn-refresh" title="Refresh">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
            <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
            <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="meta-row" id="meta-section" hidden>
      <span class="meta-label">Site</span>
      <span class="meta-value highlight" id="meta-domain">—</span>
      <span class="meta-label">Path</span>
      <span class="meta-value" id="meta-path">—</span>
    </div>
  </div>

  <!-- Content area -->
  <div class="content">

    <!-- Empty state -->
    <div class="empty-state" id="state-empty">
      <div class="empty-icon">🔎</div>
      <div class="empty-title">No request yet</div>
      <div class="empty-desc">Click the extension icon and select an environment to load an API response.</div>
    </div>

    <!-- Loading -->
    <div class="loading-state" id="state-loading" hidden>
      <div class="spinner"></div>
      <div class="loading-text">Fetching API response…</div>
    </div>

    <!-- Error -->
    <div class="error-state" id="state-error" hidden>
      <div class="error-title">Request failed</div>
      <div class="error-message" id="error-message">Unknown error</div>
    </div>

    <!-- JSON result -->
    <div id="state-result" hidden>
      <div class="response-meta">
        <span class="status-badge" id="status-badge">200</span>
        <span id="response-time"></span>
      </div>
      <div class="json-container">
        <div class="json-content" id="json-content"></div>
      </div>
    </div>

  </div>

  <script src="side_panel.js"></script>
</body>
</html>
